name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install & Lint Client
        run: |
          cd client
          npm ci
          npm run lint

      - name: Build Client
        run: |
          cd client
          npm run build

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci

      - name: Smoke Test Server
        run: |
          cd server
          node -e "console.log('Server dependencies valid')"

  docker-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t intera-app:test .

  deploy:
    name: Deploy to Render
    needs: [build-and-test, docker-verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        shell: bash
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set."
            exit 1
          fi
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"
